name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # For SARIF uploads (gosec, trivy)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: --timeout=5m
          # Only report new issues on PRs; report all on push to main
          only-new-issues: ${{ github.event_name == 'pull_request' }}
          # Don't duplicate module cache with setup-go
          skip-cache: true

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: telemetry_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Run unit tests with race detector
        run: |
          # Use ./... to catch all packages; skip if no test files exist yet
          PKGS=$(go list ./... 2>/dev/null | grep -v '/cmd/' || true)
          if [ -z "$PKGS" ]; then
            echo "No testable packages found, skipping"
            exit 0
          fi
          echo "$PKGS" | xargs go test -race -coverprofile=coverage.out -covermode=atomic -count=1

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/telemetry_test?sslmode=disable
          INTEGRATION: "true"
        run: |
          # Only run if integration test packages exist
          PKGS=$(go list -tags=integration ./tests/integration/... 2>/dev/null || true)
          if [ -z "$PKGS" ]; then
            echo "No integration test packages found, skipping"
            exit 0
          fi
          echo "$PKGS" | xargs go test -race -tags=integration -count=1 -timeout=120s

      - name: Enforce coverage threshold (80%)
        run: |
          if [ ! -f coverage.out ]; then
            echo "No coverage report yet, skipping threshold check"
            exit 0
          fi
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the 80% threshold"
            exit 1
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Report vulnerabilities but don't fail CI for stdlib-only issues.
          # Our code will inherit fixes when the Go toolchain is upgraded.
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities (see above)"

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec-results.sarif -exclude-generated ./...'

      - name: Upload gosec SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
        continue-on-error: true  # Graceful failure on fork PRs (read-only token)

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Build all binaries
        run: go build -ldflags="-s -w" ./cmd/...

      - name: Check for Dockerfile
        id: dockerfile
        run: test -f Dockerfile && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Build Docker image (no push)
        if: steps.dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: my-robo-taxi-telemetry:${{ github.sha }}

      - name: Scan Docker image with Trivy
        if: steps.dockerfile.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: my-robo-taxi-telemetry:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.dockerfile.outputs.exists == 'true'
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
