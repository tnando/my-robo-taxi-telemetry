name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  # One review at a time per PR to avoid duplicate comments
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # ─── Automatic PR Review ────────────────────────────────────────────
  # Runs on every PR open/update. Reads labels to determine domain focus.
  review:
    name: Claude Review
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Collect PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          # Get agent labels for domain-aware review
          AGENT_LABELS=$(gh pr view "$PR_NUM" --json labels -q '[.labels[].name | select(startswith("agent:"))] | join(", ")')
          echo "agent_labels=${AGENT_LABELS}" >> "$GITHUB_OUTPUT"

          # Get phase label for milestone context
          PHASE_LABEL=$(gh pr view "$PR_NUM" --json labels -q '[.labels[].name | select(startswith("phase:"))] | join(", ")')
          echo "phase_label=${PHASE_LABEL}" >> "$GITHUB_OUTPUT"

          # Get linked issue number (if any) for requirements context
          ISSUE_NUM=$(gh pr view "$PR_NUM" --json body -q '.body' | grep -oP '(?:closes|fixes|resolves)\s*#(\d+)' | head -1 | grep -oP '\d+' || echo "")
          echo "issue_num=${ISSUE_NUM}" >> "$GITHUB_OUTPUT"

          echo "Agent labels: ${AGENT_LABELS:-none}"
          echo "Phase: ${PHASE_LABEL:-none}"
          echo "Linked issue: ${ISSUE_NUM:-none}"

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          use_sticky_comment: true
          track_progress: true
          claude_args: >-
            --agent pr-reviewer
            --max-turns 50
          prompt: |
            Review this pull request.

            ## PR Context
            - **PR #${{ github.event.pull_request.number }}**: ${{ github.event.pull_request.title }}
            - **Agent labels**: ${{ steps.context.outputs.agent_labels || 'none (apply general review only)' }}
            - **Phase**: ${{ steps.context.outputs.phase_label || 'unknown' }}
            - **Linked issue**: ${{ steps.context.outputs.issue_num && format('#{0}', steps.context.outputs.issue_num) || 'none' }}

            ## Instructions

            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changes
            2. Read CLAUDE.md for project rules
            3. If there is a linked issue, run `gh issue view ${{ steps.context.outputs.issue_num }}` to understand requirements
            4. Apply BOTH general Go review AND domain-specific review based on the agent labels listed above
            5. End your review with a verdict tag (see pr-reviewer agent instructions)

            Focus on real issues, not style nits. If the code is clean and well-tested, approve it.

      - name: Extract review verdict
        id: verdict
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          # Find Claude's review comment and extract the verdict.
          # Try HTML tag first, fall back to plain-text "Verdict: APPROVE" pattern.
          LAST_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq 'last | .body')
          VERDICT=$(echo "$LAST_COMMENT" | grep -oP '(?<=<!-- VERDICT: )\w+(?= -->)' || \
                    echo "$LAST_COMMENT" | grep -oP '(?<=\*\*Verdict: )(APPROVE|REQUEST_CHANGES|COMMENT)' || echo "")

          if [ -z "$VERDICT" ]; then
            echo "::warning::No verdict tag found in Claude's review comment, defaulting to COMMENT"
            VERDICT="COMMENT"
          fi

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Extracted verdict: $VERDICT"

      - name: Submit review verdict
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          VERDICT="${{ steps.verdict.outputs.verdict }}"

          echo "Submitting review: $VERDICT"

          case "$VERDICT" in
            APPROVE)
              gh pr review "$PR_NUM" --approve --body "Claude AI review: **Approved** — all checks passed."
              ;;
            REQUEST_CHANGES)
              gh pr review "$PR_NUM" --request-changes --body "Claude AI review: **Changes requested** — see review comment above for details."
              ;;
            *)
              gh pr review "$PR_NUM" --comment --body "Claude AI review: **Comment** — see review comment above for details."
              ;;
          esac

  # ─── Interactive @claude Responses ──────────────────────────────────
  # Responds to @claude mentions in PR comments for follow-up questions.
  interactive:
    name: Claude Interactive
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GH_PAT }}
          claude_args: >-
            --max-turns 10
