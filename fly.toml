# Fly.io deployment configuration for the telemetry server.
#
# Two public services:
#   - Tesla mTLS (port 443): TCP passthrough — Fly does NOT terminate TLS,
#     the app handles the mTLS handshake directly so it can read client certs.
#   - Client WebSocket (port 4443): Fly terminates TLS, proxies HTTP to app.
#
# Prometheus metrics (port 9090) is internal only — access via `fly proxy 9090`.
#
# Deploy: fly deploy
# Secrets: fly secrets set DATABASE_URL=... AUTH_SECRET=... TESLA_KEY_FILE_B64=...

app = 'my-robo-taxi-telemetry'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

# Tesla mTLS — pure TCP passthrough (no TLS termination by Fly).
# Vehicles connect on port 443 (hardcoded in Tesla firmware).
# The app terminates TLS and extracts the VIN from the client cert.
# NO handlers — Fly passes raw TCP bytes so mTLS works end-to-end.
# NO health checks — TCP probes cause TLS EOF errors on the mTLS listener.
# internal_port 8443 because the app runs as non-root (can't bind <1024).
# Fly routes external 443 → internal 8443 transparently.
[[services]]
  internal_port = 8443
  protocol = 'tcp'

  [[services.ports]]
    port = 443

# Client WebSocket — Fly terminates TLS, proxies HTTP to internal port 8080.
# Browser clients connect on port 4443 for real-time telemetry.
# Also serves /healthz, /api/fleet-config/{vin}, and .well-known endpoint.
[[services]]
  internal_port = 8080
  protocol = 'tcp'

  [[services.ports]]
    port = 4443
    handlers = ['tls', 'http']

  [[services.http_checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'
    port = 8080

# VM sizing — 512MB to handle mTLS + WebSocket + PostgreSQL connections.
[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
