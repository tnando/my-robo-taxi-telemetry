# Fly.io deployment configuration for the telemetry server.
#
# Two public services:
#   - Tesla mTLS (port 8443): TCP passthrough — Fly does NOT terminate TLS,
#     the app handles the mTLS handshake directly so it can read client certs.
#   - Client WebSocket (port 8080): HTTP service with TLS at the edge.
#
# Prometheus metrics (port 9090) is internal only — access via `fly proxy 9090`.
#
# Deploy: fly deploy
# Secrets: fly secrets set DATABASE_URL=... AUTH_SECRET=... TESLA_KEY_FILE_B64=...

app = 'my-robo-taxi-telemetry'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

# Tesla mTLS — TCP passthrough (no TLS termination by Fly).
# Vehicles connect here with client certificates. The app terminates TLS
# and extracts the VIN from the client cert.
# External port 8443 avoids conflicting with Fly's HTTPS on port 443.
# fleet_telemetry_config uses hostname:8443 as the vehicle connection target.
[[services]]
  internal_port = 8443
  protocol = 'tcp'

  [[services.ports]]
    port = 8443

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'

# Client WebSocket — standard HTTPS with Fly's automatic TLS.
# Browser clients connect here for real-time telemetry.
# Also serves /healthz, /api/fleet-config/{vin}, and .well-known endpoint.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

  [[http_service.checks]]
    interval = '10s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/readyz'

# VM sizing — 512MB to handle mTLS + WebSocket + PostgreSQL connections.
[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
