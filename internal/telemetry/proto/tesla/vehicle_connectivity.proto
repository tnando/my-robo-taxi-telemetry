syntax = "proto3";

package telemetry.vehicle_connectivity;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/tnando/my-robo-taxi-telemetry/internal/telemetry/proto/tesla";

message VehicleConnectivity {
  string vin = 1;
  string connection_id = 2;
  ConnectivityEvent status = 3;
  google.protobuf.Timestamp created_at = 4;
  string network_interface = 5;
}

enum ConnectivityEvent {
  UNKNOWN = 0;
  CONNECTED = 1;
  DISCONNECTED = 2;
}
