      required: [deleted, auditLogId]
      additionalProperties: false
      properties:
        deleted:
          type: boolean
          const: true
          description: Always true on a successful 200 response.
          x-classification: P0
        auditLogId:
          type: string
          description: |
            Opaque cuid of the AuditLog row written per FR-10.2 /
            NFR-3.29 / data-lifecycle.md §3.1 / §4. The SDK and web
            test bench can cross-reference this ID against the audit
            log store to verify the write. The row itself is P0
            (data-lifecycle.md §4.4).
          x-classification: P0
